name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: |
          flake8 . \
            --exclude=.venv,venv,_templates \
            --max-line-length=100 \
            --count

  sql-lint:
    name: SQL Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install sqlfluff
      - run: |
          sqlfluff lint . \
            --dialect tsql \
            --exclude-rules LT05 \
            --ignore-local-config

  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g html-validate
      - run: |
          find . -name "*.html" \
            -not -path "./_templates/*" \
            -exec html-validate {} \;

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
